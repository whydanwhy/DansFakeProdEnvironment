<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ticket Detail</title>
</head>
<body>

    <h1 id="ticket-title"></h1>

    <p>
      <strong>Ticket Number:</strong> 
      <span id="ticket-id"></span>
    </p>

    <p>
      <strong>Status:</strong> 
      <span id="ticket-status"></span>
    </p>

<hr/>

    <h3>Description</h3>
    <p id="ticket-description"></p>

    <p id="loading">Loading ticket...</p>
    <p id="error" style="color:red;"></p>

<script>


document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("id");

    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");

    async function loadTicket() {
        try {
            const response = await fetch(`http://127.0.0.1:8000/tickets/${ticketId}`);

            if (!response.ok) {
                throw new Error("Ticket not found");
            }

            const data = await response.json();
            console.log("FULL RESPONSE:", data);
            console.log("NOTES:", data.notes);
            // Ticket fields
            document.getElementById("ticket-id").textContent = data.id;
            document.getElementById("ticket-title").textContent = data.title;
            document.getElementById("ticket-description").textContent = data.description;
            document.getElementById("ticket-status").textContent = data.status;

            // Notes
            const notesList = document.getElementById("notes-list");
            const noNotes = document.getElementById("no-notes");

            notesList.innerHTML = "";

            if (data.notes && data.notes.length > 0) {
                data.notes.forEach(note => {
                    const li = document.createElement("li");

                    li.innerHTML = `
                        <p>${note.content}</p>
                        <small>${note.created_at}</small>
                    `;

                    notesList.appendChild(li);
                });
            } else {
                noNotes.style.display = "block";
            }

            loadingEl.style.display = "none";

        } catch (error) {
            console.error(error);
            loadingEl.style.display = "none";
            errorEl.textContent = "Failed to load ticket";
        }
    }

    if (ticketId) {
        loadTicket();
    } else {
        errorEl.textContent = "No ticket ID provided";
        loadingEl.style.display = "none";
    }

const noteInput = document.getElementById("note-input");
const addNoteBtn = document.getElementById("add-note-btn");
const noteError = document.getElementById("note-error");

addNoteBtn.addEventListener("click", async () => {
    const content = noteInput.value.trim();

    if (!content) {
        noteError.textContent = "Note cannot be empty";
        return;
    }

    try {
        const response = await fetch(`http://127.0.0.1:8000/tickets/${ticketId}/notes`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ content })
        });

       if (response.ok) {
    noteInput.value = "";
    noteError.textContent = "";
    loadTicket(); // refresh notes
} else {
    const errorText = await response.text();
    console.error("Backend error:", errorText);
    noteError.textContent = "Error adding note";

}

        // Clear input
        noteInput.value = "";
        noteError.textContent = "";

        // Reload ticket (refresh notes)
        loadTicket();

    } catch (error) {
        console.error(error);
        noteError.textContent = "Error adding note";
    }
});

});
</script>

<h2>Notes</h2>
<ul id="notes-list"></ul>
<p id="no-notes" style="display:none;">No notes yet.</p>

<h3>Add Note</h3>

<textarea id="note-input" placeholder="Write a note..."></textarea>
<br/>
<button id="add-note-btn">Add Note</button>

<p id="note-error" style="color:red;"></p>

</body>
</html>
